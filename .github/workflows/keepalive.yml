# Free-tier Supabase projects pause after 7 days with no database request.
# This pings the REST API daily so the project stays awake. Anon gets zero
# rows back through RLS; a 200 is all we need.
name: Supabase keep-alive

on:
  schedule:
    - cron: "17 9 * * *" # daily, 09:17 UTC (off the hour to dodge cron congestion)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/user_state?select=user_id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase responded with HTTP $code"
          if [ "$code" -ne 200 ]; then
            echo "Keep-alive ping failed" >&2
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
